name: Coverage Badge (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-coverage-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage and badge
        run: npm run coverage:badge

      - name: Normalize badge path for artifact upload
        run: |
          mkdir -p coverage
          if [ -f coverage/badges.svg ]; then
            echo "coverage/badges.svg already exists"
            exit 0
          fi

          CANDIDATE="$(find . -maxdepth 4 -type f \( -name 'badges.svg' -o -name '*badge*.svg' \) | head -n 1)"
          if [ -n "$CANDIDATE" ]; then
            echo "Found badge at: $CANDIDATE"
            cp "$CANDIDATE" coverage/badges.svg
          else
            echo "No badge file was generated"
            exit 1
          fi

      - name: Upload coverage badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage/badges.svg
          if-no-files-found: error
