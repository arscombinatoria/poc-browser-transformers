name: Coverage Badge (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-coverage-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage badge file
        run: npm run coverage

      - name: Commit coverage badge
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          if [ ! -f coverage/badges.svg ]; then
            echo "coverage/badges.svg was not generated. Skipping commit."
            exit 0
          fi

          git add coverage/badges.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update coverage badge"
            if ! git pull --rebase; then
              git rebase --abort || true
              echo "Skipping badge push because rebase conflict occurred."
              exit 0
            fi
            if ! git push; then
              echo "Skipping badge push because branch was updated concurrently."
              exit 0
            fi
          fi
